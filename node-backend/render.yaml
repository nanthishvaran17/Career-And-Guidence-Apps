services:
  - type: web
    name: career-advisor-app
    env: node
    plan: free
    rootDir: .
    buildCommand: "npm install && cd frontend && npm install && npm run build && cd .. && mkdir -p node-backend/public && cp -r frontend/build/* node-backend/public/ && cd node-backend && npm install"
    startCommand: "cd node-backend && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
